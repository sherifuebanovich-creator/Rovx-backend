services:
  - type: web
    name: rovx-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: API_PREFIX
        value: api/v1
      - key: CORS_ORIGIN
        value: https://rovx-app-livid.vercel.app,http://localhost:3000
      - key: OSRM_URL
        value: https://router.project-osrm.org
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: AI_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        value: https://rovx-app-livid.vercel.app
      - key: BACKEND_URL
        value: https://rovx-backend-up1u.onrender.com
      - key: THROTTLE_SHORT_LIMIT
        value: "10"
      - key: THROTTLE_MEDIUM_LIMIT
        value: "50"
      - key: THROTTLE_LONG_LIMIT
        value: "200"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: XSOLLA_MERCHANT_ID
        sync: false
      - key: XSOLLA_API_KEY
        sync: false
      - key: XSOLLA_PROJECT_ID
        sync: false
      - key: XSOLLA_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOVERNMENT_API_URL
        sync: false
      - key: GOVERNMENT_API_KEY
        sync: false
