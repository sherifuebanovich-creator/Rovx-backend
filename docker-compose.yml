version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rovx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rovx_db
      POSTGRES_USER: rovx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rovx_secure_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rovx -d rovx_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rovx_net

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rovx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-rovx_redis_pass_2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-rovx_redis_pass_2024}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rovx_net

  # ─── Prisma Migrations (one-shot) ───────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rovx_migrate
    command: sh -c "npx prisma db push --accept-data-loss 2>/dev/null && (npx ts-node prisma/seed.ts || echo 'Seed skipped') && echo 'Migration complete'"
    environment:
      DATABASE_URL: postgresql://rovx:${POSTGRES_PASSWORD:-rovx_secure_pass_2024}@postgres:5432/rovx_db
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rovx_net
    restart: 'no'

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rovx_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://rovx:${POSTGRES_PASSWORD:-rovx_secure_pass_2024}@postgres:5432/rovx_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-rovx_redis_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-HmNiNMmNcrB4GkgYAdUH/b1rLLT5DT7vZMoYCXhfXJ1rAxzSKYaDkOpevFP5Yy7m}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-W9Nufy4tctYOcBCGtccqaxqUXTxVujtd7oCdtrvzVd5jZfssTWAZmvNaTb0paAUY}
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.groq.com/openai/v1}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
      OSRM_URL: https://router.project-osrm.org
      API_PREFIX: api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '3001:3001'
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - rovx_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    container_name: rovx_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      - backend
    ports:
      - '3000:3000'
    networks:
      - rovx_net

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rovx_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - rovx_net

networks:
  rovx_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  nginx_logs:
